# Reverse proxy de façade : route le trafic vers frontend (SPA) et backend (API).
#
# Résolution DNS dynamique : resolver interne Docker (127.0.0.11) + upstreams en
# variables -> nginx re-résout à chaque requête (pas de 502 quand les conteneurs
# backend/frontend sont recréés).
#
# Deux écoutes : HTTP (80) et HTTPS (443, certificat auto-signé). Le HTTP reste
# disponible ; en production on peut forcer la redirection vers HTTPS.

map $http_upgrade $connection_upgrade { default upgrade; "" close; }

server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend  backend:8000;
  set $frontend frontend:80;

  location /api/ {
    proxy_pass http://$backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /health { proxy_pass http://$backend; }
  location / {
    proxy_pass http://$frontend;
    proxy_set_header Host $host;
  }
}

server {
  listen 443 ssl;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend  backend:8000;
  set $frontend frontend:80;

  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  location /api/ {
    proxy_pass http://$backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /health { proxy_pass http://$backend; }
  location / {
    proxy_pass http://$frontend;
    proxy_set_header Host $host;
  }
}
